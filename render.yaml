services:
  - type: web
    name: securebank
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /auth/login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: securebank-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: securebank-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: securebank-db
          property: password
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: BANK_NAME
        value: SecureBank
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: PORT
        value: "8080"

databases:
  - name: securebank-db
    databaseName: securebank
    user: securebank_user
    plan: free
    region: singapore