<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>SecureBank — Transaction History</title>
<link
	href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
	rel="stylesheet">
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

:root {
	--primary: #1a3c5e;
	--primary-light: #2563a8;
	--accent: #f0a500;
	--bg: #f1f5f9;
	--card: #ffffff;
	--text: #1e293b;
	--muted: #64748b;
	--border: #e2e8f0;
	--danger: #dc2626;
	--success: #16a34a;
}

body {
	font-family: 'Plus Jakarta Sans', sans-serif;
	background: var(--bg);
}

.navbar {
	background: linear-gradient(135deg, var(--primary) 0%,
		var(--primary-light) 100%);
	padding: 0 32px;
	height: 64px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	box-shadow: 0 2px 12px rgba(26, 60, 94, 0.2);
}

.nav-brand {
	font-size: 1.4rem;
	font-weight: 700;
	color: white;
}

.nav-brand span {
	color: var(--accent);
}

.layout {
	display: flex;
	min-height: calc(100vh - 64px);
}

.sidebar {
	width: 220px;
	background: var(--card);
	border-right: 1px solid var(--border);
	padding: 24px 0;
}

.nav-item {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 11px 20px;
	font-size: 0.875rem;
	color: var(--muted);
	text-decoration: none;
	transition: all 0.15s;
	border-left: 3px solid transparent;
}

.nav-item.active, .nav-item:hover {
	background: #f8fafc;
	color: var(--primary);
	border-left-color: var(--primary-light);
	font-weight: 600;
}

.main {
	flex: 1;
	padding: 32px;
}

.page-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 24px;
}

.page-title {
	font-size: 1.4rem;
	font-weight: 700;
}

.account-tabs {
	display: flex;
	gap: 10px;
	margin-bottom: 20px;
	flex-wrap: wrap;
}

.account-tab {
	padding: 8px 16px;
	border: 1.5px solid var(--border);
	border-radius: 8px;
	font-size: 0.82rem;
	font-weight: 600;
	color: var(--muted);
	text-decoration: none;
	transition: all 0.15s;
	background: var(--card);
}

.account-tab.active, .account-tab:hover {
	border-color: var(--primary-light);
	color: var(--primary);
	background: #eff6ff;
}

.table-card {
	background: var(--card);
	border-radius: 16px;
	border: 1px solid var(--border);
	box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
	overflow: hidden;
}

.table-header {
	padding: 16px 20px;
	border-bottom: 1px solid var(--border);
	display: flex;
	justify-content: space-between;
	align-items: center;
}

.table-title {
	font-size: 0.95rem;
	font-weight: 700;
}

.txn-count {
	font-size: 0.8rem;
	color: var(--muted);
	background: #f1f5f9;
	padding: 4px 10px;
	border-radius: 20px;
}

table {
	width: 100%;
	border-collapse: collapse;
}

th {
	text-align: left;
	padding: 10px 20px;
	font-size: 0.72rem;
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 0.5px;
	color: var(--muted);
	background: #f8fafc;
	border-bottom: 1px solid var(--border);
}

td {
	padding: 13px 20px;
	font-size: 0.85rem;
	border-bottom: 1px solid #f1f5f9;
	color: var(--text);
}

tr:last-child td {
	border-bottom: none;
}

tr:hover td {
	background: #f8fafc;
}

.txn-credit {
	color: var(--success);
	font-weight: 700;
}

.txn-debit {
	color: var(--danger);
	font-weight: 700;
}

.badge {
	padding: 3px 10px;
	border-radius: 20px;
	font-size: 0.72rem;
	font-weight: 700;
}

.badge-success {
	background: #dcfce7;
	color: #15803d;
}

.badge-danger {
	background: #fee2e2;
	color: #dc2626;
}

.badge-transfer {
	background: #eff6ff;
	color: #2563eb;
}

.badge-deposit {
	background: #f0fdf4;
	color: #16a34a;
}

.badge-withdrawal {
	background: #fff7ed;
	color: #c2410c;
}

.ref-number {
	font-family: monospace;
	font-size: 0.78rem;
	color: var(--muted);
}

.empty-state {
	text-align: center;
	padding: 60px 20px;
	color: var(--muted);
}

.empty-icon {
	font-size: 3rem;
	margin-bottom: 12px;
}

.empty-text {
	font-size: 0.9rem;
	margin-bottom: 20px;
}

.btn-transfer-now {
	display: inline-block;
	padding: 10px 24px;
	background: linear-gradient(135deg, var(--primary), var(--primary-light));
	color: white;
	border-radius: 8px;
	text-decoration: none;
	font-size: 0.85rem;
	font-weight: 600;
}

.btn-logout {
	padding: 8px 18px;
	background: rgba(255, 255, 255, 0.15);
	color: white;
	border: 1px solid rgba(255, 255, 255, 0.3);
	border-radius: 8px;
	font-size: 0.82rem;
	font-family: inherit;
	cursor: pointer;
}

.no-account {
	background: var(--card);
	border-radius: 16px;
	padding: 40px;
	text-align: center;
	color: var(--muted);
	border: 1px solid var(--border);
}
</style>
</head>
<body>

	<nav class="navbar">
		<div class="nav-brand">
			Secure<span>Bank</span>
		</div>
		<form th:action="@{/auth/logout}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<button type="submit" class="btn-logout">Logout</button>
		</form>
	</nav>

	<div class="layout">
		<aside class="sidebar">
			<a th:href="@{/customer/dashboard}" class="nav-item"> <span>🏠</span>
				Dashboard
			</a> <a th:href="@{/customer/transfer}" class="nav-item"> <span>💸</span>
				Fund Transfer
			</a> <a th:href="@{/customer/transactions}" class="nav-item active">
				<span>📋</span> Transactions
			</a> <a th:href="@{/customer/loans}" class="nav-item"> <span>🏦</span>
				Loans
			</a> <a th:href="@{/customer/profile}" class="nav-item"> <span>👤</span>
				Profile
			</a>
		</aside>

		<main class="main">
			<div class="page-header">
				<div class="page-title">📋 Transaction History</div>
			</div>

			<!-- Account selector tabs -->
			<div class="account-tabs" th:unless="${accounts.isEmpty()}">
				<a th:each="account : ${accounts}"
					th:href="@{/customer/transactions(
                   accountId=${account.id})}"
					th:classappend="${selectedAccount != null
                   and selectedAccount.id == account.id}
                   ? 'active'"
					class="account-tab"
					th:text="${account.accountNumber
                   + ' (' + account.accountType + ')'}">
				</a>
			</div>

			<!-- No accounts -->
			<div th:if="${accounts.isEmpty()}" class="no-account">
				<div style="font-size: 2.5rem; margin-bottom: 12px;">🏦</div>
				<div>No accounts found.</div>
			</div>

			<!-- Transactions table -->
			<div class="table-card" th:unless="${accounts.isEmpty()}">
				<div class="table-header">
					<div class="table-title">
						All Transactions <span th:if="${selectedAccount != null}"
							th:text="' — ' +
                              selectedAccount.accountNumber">
						</span>
					</div>
					<div class="txn-count" th:if="${transactions != null}"
						th:text="${transactions.size()}
                         + ' transactions'">
					</div>
				</div>

				<div
					th:if="${transactions == null
                          or transactions.isEmpty()}"
					class="empty-state">
					<div class="empty-icon">📭</div>
					<div class="empty-text">No transactions found for this
						account</div>
					<a th:href="@{/customer/transfer}" class="btn-transfer-now">
						Make Your First Transfer → </a>
				</div>

				<table
					th:unless="${transactions == null
                                or transactions.isEmpty()}">
					<thead>
						<tr>
							<th>Reference No.</th>
							<th>Type</th>
							<th>Description</th>
							<th>From / To</th>
							<th>Date & Time</th>
							<th>Amount</th>
							<th>Status</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="txn : ${transactions}">
							<td class="ref-number" th:text="${txn.referenceNumber}"></td>
							<td><span
								th:class="${txn.type == 'TRANSFER' ? 'badge badge-transfer' : (txn.type == 'DEPOSIT' ? 'badge badge-deposit' : 'badge badge-withdrawal')}"
								th:text="${txn.type}"></span></td>
							<td th:text="${txn.description}"></td>
							<td style="font-family: monospace; font-size: 0.78rem;"><span
								th:if="${txn.credit}" th:text="${'From: ' + txn.fromAccount}"></span>
								<span th:unless="${txn.credit}"
								th:text="${'To: ' + txn.toAccount}"></span></td>
							<td
								th:text="${#temporals.format(txn.timestamp,'dd MMM yyyy, HH:mm')}"></td>
							<td><span
								th:class="${txn.credit} ? 'txn-credit' : 'txn-debit'"
								th:text="${(txn.credit ? '+ Rs.' : '- Rs.') + #numbers.formatDecimal(txn.amount,1,'COMMA',2,'POINT')}"></span></td>
							<td><span
								th:class="${txn.status == 'SUCCESS' ? 'badge badge-success' : 'badge badge-danger'}"
								th:text="${txn.status}"></span></td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
	</div>
</body>
</html>
