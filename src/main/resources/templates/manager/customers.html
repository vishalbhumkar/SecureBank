<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SecureBank — Customers</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#1a3c5e;--primary-light:#2563a8;
            --accent:#f0a500;--success:#16a34a;--danger:#dc2626;
            --bg:#f1f5f9;--card:#fff;--text:#1e293b;
            --muted:#64748b;--border:#e2e8f0;
        }
        body{font-family:'Plus Jakarta Sans',sans-serif;
            background:var(--bg);color:var(--text)}
        .navbar{
            background:linear-gradient(135deg,
                var(--primary) 0%,var(--primary-light) 100%);
            padding:0 32px;height:64px;display:flex;
            align-items:center;justify-content:space-between;
            box-shadow:0 2px 12px rgba(26,60,94,0.2);
        }
        .nav-brand{font-size:1.4rem;font-weight:700;color:#fff}
        .nav-brand span{color:var(--accent)}
        .layout{display:flex;min-height:calc(100vh - 64px)}
        .sidebar{
            width:230px;background:var(--card);
            border-right:1px solid var(--border);padding:24px 0;
        }
        .sidebar-section{
            font-size:0.68rem;font-weight:700;color:var(--muted);
            text-transform:uppercase;letter-spacing:1px;
            padding:16px 20px 6px;
        }
        .nav-item{
            display:flex;align-items:center;gap:10px;
            padding:10px 20px;font-size:0.875rem;
            color:var(--muted);text-decoration:none;
            border-left:3px solid transparent;transition:all 0.15s;
        }
        .nav-item.active,.nav-item:hover{
            background:#f8fafc;color:var(--primary);
            border-left-color:var(--primary-light);font-weight:600;
        }
        .main{flex:1;padding:28px 32px}
        .page-title{font-size:1.4rem;font-weight:700;
            margin-bottom:20px}
        .alert{padding:12px 16px;border-radius:10px;
            font-size:0.875rem;margin-bottom:16px}
        .alert-success{background:#f0fdf4;color:var(--success);
            border:1px solid #bbf7d0}
        .alert-danger{background:#fef2f2;color:var(--danger);
            border:1px solid #fecaca}
        .filter-tabs{
            display:flex;gap:8px;margin-bottom:20px;
        }
        .filter-tab{
            padding:8px 20px;border-radius:8px;
            font-size:0.82rem;font-weight:600;
            text-decoration:none;color:var(--muted);
            background:var(--card);
            border:1.5px solid var(--border);transition:all 0.15s;
        }
        .filter-tab.active,.filter-tab:hover{
            background:#eff6ff;color:var(--primary);
            border-color:var(--primary-light);
        }
        .table-card{
            background:var(--card);border-radius:14px;
            border:1px solid var(--border);overflow:hidden;
            box-shadow:0 2px 8px rgba(0,0,0,0.04);
        }
        .table-header{
            padding:14px 20px;
            border-bottom:1px solid var(--border);
            display:flex;justify-content:space-between;
            align-items:center;
        }
        .table-title{font-size:0.9rem;font-weight:700}
        .count-badge{
            background:#f1f5f9;color:var(--muted);
            padding:3px 10px;border-radius:20px;
            font-size:0.75rem;font-weight:600;
        }
        table{width:100%;border-collapse:collapse}
        th{
            padding:9px 16px;font-size:0.7rem;font-weight:700;
            text-transform:uppercase;letter-spacing:0.5px;
            color:var(--muted);background:#f8fafc;
            border-bottom:1px solid var(--border);text-align:left;
        }
        td{
            padding:12px 16px;font-size:0.85rem;
            border-bottom:1px solid #f1f5f9;
        }
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#f8fafc}
        .badge{
            padding:3px 10px;border-radius:20px;
            font-size:0.7rem;font-weight:700;
        }
        .badge-active{background:#dcfce7;color:#15803d}
        .badge-pending{background:#fef3c7;color:#92400e}
        .badge-inactive{background:#f1f5f9;color:var(--muted)}
        .btn-sm{
            padding:5px 12px;border-radius:6px;
            font-size:0.75rem;font-weight:600;
            border:none;cursor:pointer;font-family:inherit;
            text-decoration:none;display:inline-block;
            margin-right:4px;
        }
        .btn-approve{background:#dcfce7;color:#15803d}
        .btn-deactivate{background:#fee2e2;color:var(--danger)}
        .btn-view{background:#eff6ff;color:var(--primary-light)}
        .empty-state{
            padding:50px;text-align:center;
            color:var(--muted);font-size:0.875rem;
        }
        .btn-logout{
            padding:8px 18px;
            background:rgba(255,255,255,0.15);
            color:#fff;border:1px solid rgba(255,255,255,0.3);
            border-radius:8px;font-size:0.82rem;
            font-family:inherit;cursor:pointer;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">Secure<span>Bank</span></div>
    <form th:action="@{/auth/logout}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <button type="submit" class="btn-logout">Logout</button>
    </form>
</nav>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-section">Main</div>
        <a th:href="@{/manager/dashboard}" class="nav-item">
            <span>🏠</span> Dashboard
        </a>
        <div class="sidebar-section">Management</div>
        <a th:href="@{/manager/customers}"
           class="nav-item active">
            <span>👥</span> Customers
        </a>
        <a th:href="@{/manager/loans}" class="nav-item">
            <span>🏦</span> Loan Requests
        </a>
        <a th:href="@{/manager/tellers}" class="nav-item">
            <span>🧑‍💼</span> Tellers
        </a>
    </aside>

    <main class="main">
        <div class="page-title">👥 Customer Management</div>

        <div th:if="${successMsg}" class="alert alert-success">
            ✅ <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <a th:href="@{/manager/customers(filter=all)}"
               th:classappend="${filter == 'all'} ? ' active'"
               class="filter-tab">All Customers</a>
            <a th:href="@{/manager/customers(filter=pending)}"
               th:classappend="${filter == 'pending'} ? ' active'"
               class="filter-tab">
                Pending Approval
                <span th:if="${pendingCount > 0}"
                      th:text="'(' + ${pendingCount} + ')'">
                </span>
            </a>
        </div>

        <div class="table-card">
            <div class="table-header">
                <div class="table-title">
                    <span th:text="${filter == 'pending'}
                        ? 'Pending Approvals'
                        : 'All Customers'">
                    </span>
                </div>
                <span class="count-badge"
                      th:text="${customers.size()}
                          + ' records'">
                </span>
            </div>

            <div th:if="${customers.isEmpty()}"
                 class="empty-state">
                <div style="font-size:2rem;margin-bottom:8px">
                    👥
                </div>
                No customers found
            </div>

            <table th:unless="${customers.isEmpty()}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Registered</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c,i : ${customers}">
                        <td th:text="${i.count}"></td>
                        <td th:text="${c.fullName}"></td>
                        <td th:text="${c.email}"
                            style="font-size:0.8rem"></td>
                        <td th:text="${c.phone ?: '—'}"></td>
                        <td>
                            <span
                              th:class="${c.active}
                                ? 'badge badge-active'
                                : 'badge badge-pending'"
                              th:text="${c.active}
                                ? 'Active' : 'Pending'">
                            </span>
                        </td>
                        <td th:text="${c.createdAt != null}
                            ? ${#temporals.format(
                                c.createdAt, 'dd MMM yyyy')}
                            : '—'"
                            style="font-size:0.8rem">
                        </td>
                        <td>
                            <a th:href="@{/manager/customers/
                                {id}(id=${c.id})}"
                               class="btn-sm btn-view">
                                View
                            </a>
                            <form
                              th:if="${!c.active}"
                              th:action="@{/manager/customers/
                                {id}/approve(id=${c.id})}"
                              method="post"
                              style="display:inline">
                                <input type="hidden"
                                  th:name="${_csrf.parameterName}"
                                  th:value="${_csrf.token}"/>
                                <button type="submit"
                                        class="btn-sm btn-approve">
                                    Approve
                                </button>
                            </form>
                            <form
                              th:if="${c.active}"
                              th:action="@{/manager/customers/
                                {id}/deactivate(id=${c.id})}"
                              method="post"
                              style="display:inline">
                                <input type="hidden"
                                  th:name="${_csrf.parameterName}"
                                  th:value="${_csrf.token}"/>
                                <button type="submit"
                                        class="btn-sm btn-deactivate">
                                    Deactivate
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
