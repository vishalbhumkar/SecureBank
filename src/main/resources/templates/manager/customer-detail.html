<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>SecureBank — Customer Detail</title>
<link
	href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
	rel="stylesheet">
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box
}

:root {
	--primary: #1a3c5e;
	--primary-light: #2563a8;
	--accent: #f0a500;
	--success: #16a34a;
	--danger: #dc2626;
	--bg: #f1f5f9;
	--card: #fff;
	--text: #1e293b;
	--muted: #64748b;
	--border: #e2e8f0;
}

body {
	font-family: 'Plus Jakarta Sans', sans-serif;
	background: var(--bg);
	color: var(--text)
}

.navbar {
	background: linear-gradient(135deg, var(--primary) 0%,
		var(--primary-light) 100%);
	padding: 0 32px;
	height: 64px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	box-shadow: 0 2px 12px rgba(26, 60, 94, 0.2);
}

.nav-brand {
	font-size: 1.4rem;
	font-weight: 700;
	color: #fff
}

.nav-brand span {
	color: var(--accent)
}

.main {
	padding: 32px;
	max-width: 900px;
	margin: 0 auto
}

.back-link {
	display: inline-flex;
	align-items: center;
	gap: 6px;
	color: var(--muted);
	text-decoration: none;
	font-size: 0.85rem;
	margin-bottom: 20px;
}

.back-link:hover {
	color: var(--primary)
}

.page-title {
	font-size: 1.4rem;
	font-weight: 700;
	margin-bottom: 20px
}

.detail-grid {
	display: grid;
	grid-template-columns: 1fr 1.5fr;
	gap: 20px;
	margin-bottom: 20px;
}

.card {
	background: var(--card);
	border-radius: 14px;
	border: 1px solid var(--border);
	padding: 22px;
}

.card-title {
	font-size: 0.9rem;
	font-weight: 700;
	margin-bottom: 16px;
	color: var(--text);
}

.info-row {
	display: flex;
	justify-content: space-between;
	padding: 9px 0;
	border-bottom: 1px solid var(--border);
	font-size: 0.85rem;
}

.info-row:last-child {
	border-bottom: none
}

.info-label {
	color: var(--muted)
}

.info-value {
	font-weight: 600
}

.badge {
	padding: 3px 10px;
	border-radius: 20px;
	font-size: 0.7rem;
	font-weight: 700;
}

.badge-active {
	background: #dcfce7;
	color: #15803d
}

.badge-pending {
	background: #fef3c7;
	color: #92400e
}

.action-bar {
	display: flex;
	gap: 10px;
	margin-top: 16px;
}

.btn {
	padding: 9px 20px;
	border-radius: 8px;
	font-size: 0.85rem;
	font-weight: 600;
	border: none;
	cursor: pointer;
	font-family: inherit;
}

.btn-approve {
	background: var(--success);
	color: #fff;
}

.btn-deactivate {
	background: var(--danger);
	color: #fff
}

table {
	width: 100%;
	border-collapse: collapse
}

th {
	padding: 9px 14px;
	font-size: 0.7rem;
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 0.5px;
	color: var(--muted);
	background: #f8fafc;
	border-bottom: 1px solid var(--border);
	text-align: left;
}

td {
	padding: 10px 14px;
	font-size: 0.82rem;
	border-bottom: 1px solid #f1f5f9;
}

tr:last-child td {
	border-bottom: none
}

.empty-state {
	padding: 24px;
	text-align: center;
	color: var(--muted);
	font-size: 0.85rem
}

.btn-logout {
	padding: 8px 18px;
	background: rgba(255, 255, 255, 0.15);
	color: #fff;
	border: 1px solid rgba(255, 255, 255, 0.3);
	border-radius: 8px;
	font-size: 0.82rem;
	font-family: inherit;
	cursor: pointer;
}

.badge-loan-pending {
	background: #fef3c7;
	color: #92400e
}

.badge-loan-approved {
	background: #dcfce7;
	color: #15803d
}

.badge-loan-rejected {
	background: #fee2e2;
	color: var(--danger)
}
</style>
</head>
<body>

	<nav class="navbar">
		<div class="nav-brand">
			Secure<span>Bank</span>
		</div>
		<form th:action="@{/auth/logout}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<button type="submit" class="btn-logout">Logout</button>
		</form>
	</nav>

	<div class="main">
		<a th:href="@{/manager/customers}" class="back-link">← Back to
			Customers</a>
		<div class="page-title">👤 Customer Detail</div>

		<div class="detail-grid">

			<!-- Customer Info -->
			<div class="card">
				<div class="card-title">Personal Information</div>
				<div class="info-row">
					<span class="info-label">Full Name</span> <span class="info-value"
						th:text="${customer.fullName}"></span>
				</div>
				<div class="info-row">
					<span class="info-label">Email</span> <span class="info-value"
						style="font-size: 0.8rem" th:text="${customer.email}"></span>
				</div>
				<div class="info-row">
					<span class="info-label">Phone</span> <span class="info-value"
						th:text="${customer.phone ?: '—'}"> </span>
				</div>
				<div class="info-row">
					<span class="info-label">Address</span> <span class="info-value"
						th:text="${customer.address ?: '—'}"> </span>
				</div>
				<div class="info-row">
					<span class="info-label">Status</span> <span
						th:class="${customer.active}
                    ? 'badge badge-active'
                    : 'badge badge-pending'"
						th:text="${customer.active}
                          ? 'Active' : 'Pending Approval'">
					</span>
				</div>
				<div class="info-row">
					<span class="info-label">Registered</span> <span class="info-value"
						th:text="${customer.createdAt != null}
                          ? ${#temporals.format(
                              customer.createdAt,
                              'dd MMM yyyy')} : '—'">
					</span>
				</div>

				<!-- Action Buttons -->
				<div class="action-bar">
					<form th:if="${!customer.active}"
						th:action="@{/manager/customers/
                    {id}/approve(id=${customer.id})}"
						method="post">
						<input type="hidden" th:name="${_csrf.parameterName}"
							th:value="${_csrf.token}" />
						<button type="submit" class="btn btn-approve">✅ Approve
							Account</button>
					</form>
					<form th:if="${customer.active}"
						th:action="@{/manager/customers/
                    {id}/deactivate(id=${customer.id})}"
						method="post">
						<input type="hidden" th:name="${_csrf.parameterName}"
							th:value="${_csrf.token}" />
						<button type="submit" class="btn btn-deactivate">🚫
							Deactivate</button>
					</form>
				</div>
			</div>

			<!-- Loan History -->
			<div class="card">
				<div class="card-title">Loan History</div>

				<div th:if="${loans.isEmpty()}" class="empty-state">No loan
					applications yet</div>

				<table th:unless="${loans.isEmpty()}">
					<thead>
						<tr>
							<th>Amount</th>
							<th>Tenure</th>
							<th>Applied</th>
							<th>Status</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="loan : ${loans}">
							<td
								th:text="'Rs.' + #numbers.formatDecimal(loan.amount,1,'COMMA',2,'POINT')"></td>
							<td
								th:text="${loan.tenureMonths}
                            + ' mo'"></td>
							<td
								th:text="${#temporals.format(
                            loan.appliedAt,
                            'dd MMM yy')}"
								style="font-size: 0.78rem"></td>
							<td><span
								th:class="${loan.status.name()
                                == 'PENDING'}
                                ? 'badge badge-loan-pending'
                                : (loan.status.name()
                                    == 'APPROVED'
                                    ? 'badge badge-loan-approved'
                                    : 'badge badge-loan-rejected')"
								th:text="${loan.status}"> </span></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</body>
</html>
