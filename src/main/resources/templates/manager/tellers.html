<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SecureBank — Teller Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#1a3c5e;--primary-light:#2563a8;
            --accent:#f0a500;--success:#16a34a;--danger:#dc2626;
            --bg:#f1f5f9;--card:#fff;--text:#1e293b;
            --muted:#64748b;--border:#e2e8f0;
        }
        body{font-family:'Plus Jakarta Sans',sans-serif;
            background:var(--bg);color:var(--text)}
        .navbar{
            background:linear-gradient(135deg,
                var(--primary) 0%,var(--primary-light) 100%);
            padding:0 32px;height:64px;display:flex;
            align-items:center;justify-content:space-between;
            box-shadow:0 2px 12px rgba(26,60,94,0.2);
        }
        .nav-brand{font-size:1.4rem;font-weight:700;color:#fff}
        .nav-brand span{color:var(--accent)}
        .layout{display:flex;min-height:calc(100vh - 64px)}
        .sidebar{
            width:230px;background:var(--card);
            border-right:1px solid var(--border);padding:24px 0;
        }
        .sidebar-section{
            font-size:0.68rem;font-weight:700;color:var(--muted);
            text-transform:uppercase;letter-spacing:1px;
            padding:16px 20px 6px;
        }
        .nav-item{
            display:flex;align-items:center;gap:10px;
            padding:10px 20px;font-size:0.875rem;
            color:var(--muted);text-decoration:none;
            border-left:3px solid transparent;transition:all 0.15s;
        }
        .nav-item.active,.nav-item:hover{
            background:#f8fafc;color:var(--primary);
            border-left-color:var(--primary-light);font-weight:600;
        }
        .main{flex:1;padding:28px 32px}
        .page-header{
            display:flex;justify-content:space-between;
            align-items:center;margin-bottom:20px;
        }
        .page-title{font-size:1.4rem;font-weight:700}
        .alert{padding:12px 16px;border-radius:10px;
            font-size:0.875rem;margin-bottom:16px}
        .alert-success{background:#f0fdf4;color:var(--success);
            border:1px solid #bbf7d0}
        .alert-danger{background:#fef2f2;color:var(--danger);
            border:1px solid #fecaca}
        .content-grid{
            display:grid;
            grid-template-columns:2fr 1fr;
            gap:20px;
        }
        .table-card{
            background:var(--card);border-radius:14px;
            border:1px solid var(--border);overflow:hidden;
        }
        .table-header{
            padding:14px 20px;
            border-bottom:1px solid var(--border);
        }
        .table-title{font-size:0.9rem;font-weight:700}
        table{width:100%;border-collapse:collapse}
        th{
            padding:9px 16px;font-size:0.7rem;font-weight:700;
            text-transform:uppercase;letter-spacing:0.5px;
            color:var(--muted);background:#f8fafc;
            border-bottom:1px solid var(--border);text-align:left;
        }
        td{padding:12px 16px;font-size:0.85rem;
            border-bottom:1px solid #f1f5f9}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#f8fafc}
        .badge-active{
            padding:3px 10px;border-radius:20px;
            font-size:0.7rem;font-weight:700;
            background:#dcfce7;color:#15803d;
        }
        .form-card{
            background:var(--card);border-radius:14px;
            border:1px solid var(--border);padding:24px;
        }
        .form-card-title{
            font-size:0.95rem;font-weight:700;
            margin-bottom:18px;
        }
        .form-group{margin-bottom:16px}
        .form-label{
            display:block;font-size:0.75rem;font-weight:700;
            text-transform:uppercase;letter-spacing:0.5px;
            color:var(--text);margin-bottom:5px;
        }
        .form-control{
            width:100%;padding:10px 12px;
            border:1.5px solid var(--border);border-radius:8px;
            font-size:0.875rem;font-family:inherit;
            color:var(--text);background:#f8fafc;outline:none;
            transition:all 0.2s;
        }
        .form-control:focus{
            border-color:var(--primary-light);background:#fff;
            box-shadow:0 0 0 3px rgba(37,99,168,0.1);
        }
        .btn-create{
            width:100%;padding:11px;
            background:linear-gradient(135deg,
                var(--primary),var(--primary-light));
            color:#fff;border:none;border-radius:8px;
            font-size:0.875rem;font-weight:600;
            font-family:inherit;cursor:pointer;
        }
        .default-pass{
            background:#fffbeb;border:1px solid #fde68a;
            border-radius:8px;padding:10px 12px;
            font-size:0.78rem;color:#92400e;margin-top:12px;
        }
        .empty-state{
            padding:40px;text-align:center;
            color:var(--muted);font-size:0.875rem;
        }
        .btn-logout{
            padding:8px 18px;
            background:rgba(255,255,255,0.15);
            color:#fff;border:1px solid rgba(255,255,255,0.3);
            border-radius:8px;font-size:0.82rem;
            font-family:inherit;cursor:pointer;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">Secure<span>Bank</span></div>
    <form th:action="@{/auth/logout}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <button type="submit" class="btn-logout">Logout</button>
    </form>
</nav>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-section">Main</div>
        <a th:href="@{/manager/dashboard}" class="nav-item">
            <span>🏠</span> Dashboard
        </a>
        <div class="sidebar-section">Management</div>
        <a th:href="@{/manager/customers}" class="nav-item">
            <span>👥</span> Customers
        </a>
        <a th:href="@{/manager/loans}" class="nav-item">
            <span>🏦</span> Loan Requests
        </a>
        <a th:href="@{/manager/tellers}"
           class="nav-item active">
            <span>🧑‍💼</span> Tellers
        </a>
    </aside>

    <main class="main">
        <div class="page-header">
            <div class="page-title">🧑‍💼 Teller Management</div>
        </div>

        <div th:if="${successMsg}" class="alert alert-success">
            ✅ <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>

        <div class="content-grid">

            <!-- Tellers Table -->
            <div class="table-card">
                <div class="table-header">
                    <div class="table-title">All Tellers</div>
                </div>

                <div th:if="${tellers.isEmpty()}"
                     class="empty-state">
                    No tellers found. Create one →
                </div>

                <table th:unless="${tellers.isEmpty()}">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t,i : ${tellers}">
                            <td th:text="${i.count}"></td>
                            <td th:text="${t.fullName}"></td>
                            <td th:text="${t.email}"
                                style="font-size:0.8rem">
                            </td>
                            <td th:text="${t.phone ?: '—'}">
                            </td>
                            <td>
                                <span class="badge-active">
                                    Active
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Create Teller Form -->
            <div class="form-card">
                <div class="form-card-title">
                    ➕ Create New Teller
                </div>

                <form th:action="@{/manager/tellers/create}"
                      method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text"
                               name="fullName"
                               class="form-control"
                               placeholder="Teller full name"
                               required/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="teller@securebank.com"
                               required/>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="text"
                               name="phone"
                               class="form-control"
                               placeholder="10-digit number"/>
                    </div>

                    <button type="submit" class="btn-create">
                        Create Teller Account
                    </button>

                    <div class="default-pass">
                        🔑 Default password: <strong>Teller@123</strong><br>
                        Ask teller to change on first login.
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
