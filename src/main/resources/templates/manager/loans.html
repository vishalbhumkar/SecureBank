<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>SecureBank — Loan Requests</title>
<link
	href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
	rel="stylesheet">
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box
}

:root {
	--primary: #1a3c5e;
	--primary-light: #2563a8;
	--accent: #f0a500;
	--success: #16a34a;
	--danger: #dc2626;
	--bg: #f1f5f9;
	--card: #fff;
	--text: #1e293b;
	--muted: #64748b;
	--border: #e2e8f0;
}

body {
	font-family: 'Plus Jakarta Sans', sans-serif;
	background: var(--bg);
	color: var(--text)
}

.navbar {
	background: linear-gradient(135deg, var(--primary) 0%,
		var(--primary-light) 100%);
	padding: 0 32px;
	height: 64px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	box-shadow: 0 2px 12px rgba(26, 60, 94, 0.2);
}

.nav-brand {
	font-size: 1.4rem;
	font-weight: 700;
	color: #fff
}

.nav-brand span {
	color: var(--accent)
}

.layout {
	display: flex;
	min-height: calc(100vh - 64px)
}

.sidebar {
	width: 230px;
	background: var(--card);
	border-right: 1px solid var(--border);
	padding: 24px 0
}

.sidebar-section {
	font-size: 0.68rem;
	font-weight: 700;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 1px;
	padding: 16px 20px 6px
}

.nav-item {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 10px 20px;
	font-size: 0.875rem;
	color: var(--muted);
	text-decoration: none;
	border-left: 3px solid transparent;
	transition: all 0.15s
}

.nav-item.active, .nav-item:hover {
	background: #f8fafc;
	color: var(--primary);
	border-left-color: var(--primary-light);
	font-weight: 600
}

.main {
	flex: 1;
	padding: 28px 32px
}

.page-title {
	font-size: 1.4rem;
	font-weight: 700;
	margin-bottom: 20px
}

.alert {
	padding: 12px 16px;
	border-radius: 10px;
	font-size: 0.875rem;
	margin-bottom: 16px;
	display: flex;
	align-items: center;
	gap: 8px
}

.alert-success {
	background: #f0fdf4;
	color: var(--success);
	border: 1px solid #bbf7d0
}

.alert-danger {
	background: #fef2f2;
	color: var(--danger);
	border: 1px solid #fecaca
}

.filter-tabs {
	display: flex;
	gap: 8px;
	margin-bottom: 20px
}

.filter-tab {
	padding: 8px 20px;
	border-radius: 8px;
	font-size: 0.82rem;
	font-weight: 600;
	text-decoration: none;
	color: var(--muted);
	background: var(--card);
	border: 1.5px solid var(--border);
	transition: all 0.15s
}

.filter-tab.active {
	background: #eff6ff;
	color: var(--primary);
	border-color: var(--primary-light)
}

/* LOAN CARDS */
.loans-list {
	display: flex;
	flex-direction: column;
	gap: 14px
}

.loan-card {
	background: var(--card);
	border-radius: 12px;
	border: 1px solid var(--border);
	padding: 20px;
	box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
	transition: all 0.2s
}

.loan-card:hover {
	box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08)
}

.loan-card-top {
	display: flex;
	justify-content: space-between;
	align-items: flex-start;
	margin-bottom: 14px
}

.loan-customer-name {
	font-size: 1rem;
	font-weight: 700;
	color: var(--text)
}

.loan-customer-email {
	font-size: 0.78rem;
	color: var(--muted);
	margin-top: 2px
}

.loan-amount {
	font-size: 1.3rem;
	font-weight: 700;
	color: var(--primary);
	text-align: right
}

.loan-date {
	font-size: 0.75rem;
	color: var(--muted);
	margin-top: 2px
}

.loan-card-mid {
	display: grid;
	grid-template-columns: repeat(4, 1fr);
	gap: 10px;
	margin-bottom: 14px;
	background: #f8fafc;
	border-radius: 8px;
	padding: 12px
}

.loan-meta-item {
	text-align: center
}

.loan-meta-label {
	font-size: 0.68rem;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 0.5px;
	margin-bottom: 3px
}

.loan-meta-value {
	font-size: 0.875rem;
	font-weight: 700;
	color: var(--text)
}

.loan-card-bottom {
	display: flex;
	gap: 10px;
	align-items: center;
	flex-wrap: wrap
}

/* APPROVE/REJECT INLINE FORMS */
.action-group {
	display: flex;
	gap: 8px;
	align-items: center;
	flex: 1
}

.remarks-input {
	flex: 1;
	padding: 8px 12px;
	border: 1.5px solid var(--border);
	border-radius: 8px;
	font-size: 0.82rem;
	font-family: inherit;
	background: #f8fafc;
	outline: none;
	min-width: 140px
}

.remarks-input:focus {
	border-color: var(--primary-light);
	background: #fff
}

.btn-approve {
	padding: 8px 18px;
	border-radius: 8px;
	font-size: 0.82rem;
	font-weight: 700;
	background: #dcfce7;
	color: #15803d;
	border: 1.5px solid #bbf7d0;
	cursor: pointer;
	font-family: inherit;
	white-space: nowrap
}

.btn-approve:hover {
	background: #16a34a;
	color: #fff;
	border-color: #16a34a
}

.btn-reject {
	padding: 8px 18px;
	border-radius: 8px;
	font-size: 0.82rem;
	font-weight: 700;
	background: #fee2e2;
	color: var(--danger);
	border: 1.5px solid #fecaca;
	cursor: pointer;
	font-family: inherit;
	white-space: nowrap
}

.btn-reject:hover {
	background: var(--danger);
	color: #fff;
	border-color: var(--danger)
}

.badge {
	padding: 4px 12px;
	border-radius: 20px;
	font-size: 0.72rem;
	font-weight: 700
}

.badge-pending {
	background: #fef3c7;
	color: #92400e
}

.badge-approved {
	background: #dcfce7;
	color: #15803d
}

.badge-rejected {
	background: #fee2e2;
	color: var(--danger)
}

.badge-closed {
	background: #f1f5f9;
	color: var(--muted)
}

.reviewed-info {
	font-size: 0.78rem;
	color: var(--muted);
	padding: 6px 12px;
	background: #f8fafc;
	border-radius: 6px;
	border: 1px solid var(--border)
}

.empty-state {
	background: var(--card);
	border-radius: 14px;
	border: 1px solid var(--border);
	padding: 60px;
	text-align: center;
	color: var(--muted)
}

.empty-icon {
	font-size: 3rem;
	margin-bottom: 12px
}

.btn-logout {
	padding: 8px 18px;
	background: rgba(255, 255, 255, 0.15);
	color: #fff;
	border: 1px solid rgba(255, 255, 255, 0.3);
	border-radius: 8px;
	font-size: 0.82rem;
	font-family: inherit;
	cursor: pointer
}

.stats-row {
	display: grid;
	grid-template-columns: repeat(4, 1fr);
	gap: 14px;
	margin-bottom: 20px
}

.stat-mini {
	background: var(--card);
	border-radius: 10px;
	border: 1px solid var(--border);
	padding: 14px 16px;
	display: flex;
	align-items: center;
	gap: 12px
}

.stat-mini-icon {
	font-size: 1.4rem
}

.stat-mini-label {
	font-size: 0.72rem;
	color: var(--muted)
}

.stat-mini-value {
	font-size: 1.2rem;
	font-weight: 700
}
</style>
</head>
<body>

	<nav class="navbar">
		<div class="nav-brand">
			Secure<span>Bank</span>
		</div>
		<form th:action="@{/auth/logout}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<button type="submit" class="btn-logout">Logout</button>
		</form>
	</nav>

	<div class="layout">
		<aside class="sidebar">
			<div class="sidebar-section">Main</div>
			<a th:href="@{/manager/dashboard}" class="nav-item"> <span>🏠</span>
				Dashboard
			</a>
			<div class="sidebar-section">Management</div>
			<a th:href="@{/manager/customers}" class="nav-item"> <span>👥</span>
				Customers
			</a> <a th:href="@{/manager/loans}" class="nav-item active"> <span>🏦</span>
				Loan Requests
			</a> <a th:href="@{/manager/tellers}" class="nav-item"> <span>🧑‍💼</span>
				Tellers
			</a>
		</aside>

		<main class="main">
			<div class="page-title">🏦 Loan Request Management</div>

			<div th:if="${successMsg}" class="alert alert-success">
				✅ <span th:text="${successMsg}"></span>
			</div>
			<div th:if="${errorMsg}" class="alert alert-danger">
				⚠️ <span th:text="${errorMsg}"></span>
			</div>

			<!-- Stats Row -->
			<div class="stats-row">
				<div class="stat-mini">
					<div class="stat-mini-icon">⏳</div>
					<div>
						<div class="stat-mini-label">Pending</div>
						<div class="stat-mini-value" th:text="${pendingCount}">0</div>
					</div>
				</div>
				<div class="stat-mini">
					<div class="stat-mini-icon">📋</div>
					<div>
						<div class="stat-mini-label">Total</div>
						<div class="stat-mini-value" th:text="${loans.size()}">0</div>
					</div>
				</div>
			</div>

			<!-- Filter Tabs -->
			<div class="filter-tabs">
				<a th:href="@{/manager/loans(filter=pending)}"
					th:classappend="${filter=='pending'}?' active'" class="filter-tab">
					⏳ Pending <span th:if="${pendingCount > 0}"
					th:text="'(' + ${pendingCount} + ')'"> </span>
				</a> <a th:href="@{/manager/loans(filter=all)}"
					th:classappend="${filter=='all'}?' active'" class="filter-tab">
					📋 All Loans </a>
			</div>

			<!-- Empty State -->
			<div th:if="${loans.isEmpty()}" class="empty-state">
				<div class="empty-icon">✅</div>
				<div
					style="font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 4px">
					No loan requests found</div>
				<div style="font-size: 0.85rem">All caught up!</div>
			</div>

			<!-- Loan Cards -->
			<div class="loans-list" th:unless="${loans.isEmpty()}">
				<div class="loan-card" th:each="loan : ${loans}">

					<!-- Top: Customer + Amount -->
					<div class="loan-card-top">
						<div>
							<div class="loan-customer-name" th:text="${loan.user.fullName}">
							</div>
							<div class="loan-customer-email" th:text="${loan.user.email}">
							</div>
						</div>
						<div>
							<div class="loan-amount"
								th:text="${'Rs.' + #numbers.formatDecimal(loan.amount,1,'COMMA',2,'POINT')}"></div>
							<div class="loan-date"
								th:text="${'Applied: ' + #temporals.format(loan.appliedAt,'dd MMM yyyy')}"></div>
						</div>
					</div>

					<!-- Mid: Details Grid -->
					<div class="loan-card-mid">
						<div class="loan-meta-item">
							<div class="loan-meta-label">Tenure</div>
							<div class="loan-meta-value"
								th:text="${loan.tenureMonths}
                                 + ' months'">
							</div>
						</div>
						<div class="loan-meta-item">
							<div class="loan-meta-label">Interest Rate</div>
							<div class="loan-meta-value"
								th:text="${loan.interestRate}
                                 + '% p.a.'">
							</div>
						</div>
						<div class="loan-meta-item">
							<div class="loan-meta-label">Monthly EMI</div>
							<div class="loan-meta-value">
								Rs.<span
									th:text="${#numbers.formatDecimal(loan.monthlyEmi,1,'COMMA',2,'POINT')}"></span>
							</div>
						</div>
						<div class="loan-meta-item">
							<div class="loan-meta-label">Status</div>
							<div>
								<span
									th:class="${loan.status.name()=='PENDING' ? 'badge badge-pending' : (loan.status.name()=='APPROVED' ? 'badge badge-approved' : (loan.status.name()=='REJECTED' ? 'badge badge-rejected' : 'badge badge-closed'))}"
									th:text="${loan.status}"></span>
							</div>
						</div>
					</div>

					<!-- Bottom: Actions -->
					<div class="loan-card-bottom">

						<!-- Pending: Show Approve/Reject -->
						<div
							th:if="${loan.status.name()
                        == 'PENDING'}"
							style="display: flex; gap: 12px; flex-wrap: wrap; width: 100%">

							<!-- Approve Form -->
							<form
								th:action="@{/manager/loans/
                            {id}/approve(id=${loan.id})}"
								method="post" style="display: flex; gap: 8px; flex: 1">
								<input type="hidden" th:name="${_csrf.parameterName}"
									th:value="${_csrf.token}" /> <input type="text" name="remarks"
									class="remarks-input" placeholder="Approval remarks (optional)" />
								<button type="submit" class="btn-approve">✓ Approve</button>
							</form>

							<!-- Reject Form -->
							<form
								th:action="@{/manager/loans/
                            {id}/reject(id=${loan.id})}"
								method="post" style="display: flex; gap: 8px; flex: 1">
								<input type="hidden" th:name="${_csrf.parameterName}"
									th:value="${_csrf.token}" /> <input type="text" name="remarks"
									class="remarks-input" placeholder="Rejection reason (required)" />
								<button type="submit" class="btn-reject">✗ Reject</button>
							</form>
						</div>

						<!-- Reviewed: Show Info -->
						<div th:unless="${loan.status.name() == 'PENDING'}"
							class="reviewed-info" style="width: 100%">
							<span th:if="${loan.reviewedAt != null}"
								th:text="${'Reviewed on: ' + #temporals.format(loan.reviewedAt,'dd MMM yyyy, HH:mm')}"></span>
							<span
								th:if="${loan.managerRemarks != null and !loan.managerRemarks.isEmpty()}"
								th:text="${' | Remarks: ' + loan.managerRemarks}"></span>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</body>
</html>
