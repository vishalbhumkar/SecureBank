<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>SecureBank — User Management</title>
<link
	href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
	rel="stylesheet">
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box
}

:root {
	--primary: #1a3c5e;
	--primary-light: #2563a8;
	--accent: #f0a500;
	--success: #16a34a;
	--danger: #dc2626;
	--bg: #f1f5f9;
	--card: #fff;
	--text: #1e293b;
	--muted: #64748b;
	--border: #e2e8f0;
}

body {
	font-family: 'Plus Jakarta Sans', sans-serif;
	background: var(--bg);
	color: var(--text)
}

.navbar {
	background: linear-gradient(135deg, var(--primary) 0%,
		var(--primary-light) 100%);
	padding: 0 32px;
	height: 64px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	box-shadow: 0 2px 12px rgba(26, 60, 94, 0.2);
}

.nav-brand {
	font-size: 1.4rem;
	font-weight: 700;
	color: #fff
}

.nav-brand span {
	color: var(--accent)
}

.layout {
	display: flex;
	min-height: calc(100vh - 64px)
}

.sidebar {
	width: 230px;
	background: var(--card);
	border-right: 1px solid var(--border);
	padding: 24px 0
}

.sidebar-section {
	font-size: 0.68rem;
	font-weight: 700;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 1px;
	padding: 16px 20px 6px
}

.nav-item {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 10px 20px;
	font-size: 0.875rem;
	color: var(--muted);
	text-decoration: none;
	border-left: 3px solid transparent;
	transition: all 0.15s
}

.nav-item.active, .nav-item:hover {
	background: #f8fafc;
	color: var(--primary);
	border-left-color: var(--primary-light);
	font-weight: 600
}

.main {
	flex: 1;
	padding: 28px 32px
}

.page-title {
	font-size: 1.4rem;
	font-weight: 700;
	margin-bottom: 20px
}

.alert {
	padding: 12px 16px;
	border-radius: 10px;
	font-size: 0.875rem;
	margin-bottom: 16px
}

.alert-success {
	background: #f0fdf4;
	color: var(--success);
	border: 1px solid #bbf7d0
}

.filter-tabs {
	display: flex;
	gap: 8px;
	margin-bottom: 20px;
	flex-wrap: wrap
}

.filter-tab {
	padding: 7px 16px;
	border-radius: 8px;
	font-size: 0.8rem;
	font-weight: 600;
	text-decoration: none;
	color: var(--muted);
	background: var(--card);
	border: 1.5px solid var(--border);
	transition: all 0.15s
}

.filter-tab.active {
	background: #eff6ff;
	color: var(--primary);
	border-color: var(--primary-light)
}

.table-card {
	background: var(--card);
	border-radius: 14px;
	border: 1px solid var(--border);
	overflow: hidden
}

.table-header {
	padding: 14px 20px;
	border-bottom: 1px solid var(--border);
	display: flex;
	justify-content: space-between;
	align-items: center
}

.table-title {
	font-size: 0.9rem;
	font-weight: 700
}

.count {
	background: #f1f5f9;
	color: var(--muted);
	padding: 3px 10px;
	border-radius: 20px;
	font-size: 0.75rem;
	font-weight: 600
}

table {
	width: 100%;
	border-collapse: collapse
}

th {
	padding: 9px 14px;
	font-size: 0.68rem;
	font-weight: 700;
	text-transform: uppercase;
	color: var(--muted);
	background: #f8fafc;
	border-bottom: 1px solid var(--border);
	text-align: left
}

td {
	padding: 11px 14px;
	font-size: 0.83rem;
	border-bottom: 1px solid #f1f5f9
}

tr:last-child td {
	border-bottom: none
}

tr:hover td {
	background: #f8fafc
}

.badge {
	padding: 3px 9px;
	border-radius: 20px;
	font-size: 0.7rem;
	font-weight: 700
}

.badge-admin {
	background: #fef3c7;
	color: #92400e
}

.badge-manager {
	background: #ede9fe;
	color: #7c3aed
}

.badge-teller {
	background: #e0f2fe;
	color: #0369a1
}

.badge-customer {
	background: #f0fdf4;
	color: #15803d
}

.badge-active {
	background: #dcfce7;
	color: #15803d
}

.badge-inactive {
	background: #fee2e2;
	color: var(--danger)
}

.badge-locked {
	background: #fef3c7;
	color: #92400e
}

.btn-sm {
	padding: 5px 11px;
	border-radius: 6px;
	font-size: 0.73rem;
	font-weight: 600;
	border: none;
	cursor: pointer;
	font-family: inherit;
	text-decoration: none;
	display: inline-block;
	margin-right: 3px
}

.btn-toggle-on {
	background: #fee2e2;
	color: var(--danger)
}

.btn-toggle-off {
	background: #dcfce7;
	color: #15803d
}

.btn-unlock {
	background: #fef3c7;
	color: #92400e
}

.empty {
	padding: 40px;
	text-align: center;
	color: var(--muted);
	font-size: 0.875rem
}

.btn-logout {
	padding: 8px 18px;
	background: rgba(255, 255, 255, 0.15);
	color: #fff;
	border: 1px solid rgba(255, 255, 255, 0.3);
	border-radius: 8px;
	font-size: 0.82rem;
	font-family: inherit;
	cursor: pointer
}
</style>
</head>
<body>
	<nav class="navbar">
		<div class="nav-brand">
			Secure<span>Bank</span>
		</div>
		<form th:action="@{/auth/logout}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<button type="submit" class="btn-logout">Logout</button>
		</form>
	</nav>

	<div class="layout">
		<aside class="sidebar">
			<div class="sidebar-section">Main</div>
			<a th:href="@{/admin/dashboard}" class="nav-item"> <span>🏠</span>
				Dashboard
			</a>
			<div class="sidebar-section">System</div>
			<a th:href="@{/admin/users}" class="nav-item active"> <span>👥</span>
				All Users
			</a> <a th:href="@{/admin/transactions}" class="nav-item"> <span>💳</span>
				Transactions
			</a> <a th:href="@{/admin/audit-logs}" class="nav-item"> <span>📋</span>
				Audit Logs
			</a> <a th:href="@{/admin/reports}" class="nav-item"> <span>📊</span>
				Reports
			</a>
		</aside>

		<main class="main">
			<div class="page-title">👥 User Management</div>

			<div th:if="${successMsg}" class="alert alert-success">
				✅ <span th:text="${successMsg}"></span>
			</div>

			<!-- Role Filter Tabs -->
			<div class="filter-tabs">
				<a th:href="@{/admin/users(role=all)}"
					th:classappend="${roleFilter=='all'}?' active'" class="filter-tab">All</a>
				<a th:href="@{/admin/users(role=admin)}"
					th:classappend="${roleFilter=='admin'}?' active'"
					class="filter-tab">Admins</a> <a
					th:href="@{/admin/users(role=manager)}"
					th:classappend="${roleFilter=='manager'}?' active'"
					class="filter-tab">Managers</a> <a
					th:href="@{/admin/users(role=teller)}"
					th:classappend="${roleFilter=='teller'}?' active'"
					class="filter-tab">Tellers</a> <a
					th:href="@{/admin/users(role=customer)}"
					th:classappend="${roleFilter=='customer'}?' active'"
					class="filter-tab">Customers</a>
			</div>

			<div class="table-card">
				<div class="table-header">
					<div class="table-title">Users</div>
					<span class="count"
						th:text="${users.size()}
                          + ' records'"></span>
				</div>

				<div th:if="${users.isEmpty()}" class="empty">No users found</div>

				<table th:unless="${users.isEmpty()}">
					<thead>
						<tr>
							<th>#</th>
							<th>Name</th>
							<th>Email</th>
							<th>Role</th>
							<th>Status</th>
							<th>Locked</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="u,i : ${users}">
							<td th:text="${i.count}"></td>
							<td th:text="${u.fullName}"></td>
							<td th:text="${u.email}" style="font-size: 0.78rem"></td>
							<td><span
								th:class="${u.role.name()=='ADMIN' ? 'badge badge-admin' : (u.role.name()=='MANAGER' ? 'badge badge-manager' : (u.role.name()=='TELLER' ? 'badge badge-teller' : 'badge badge-customer'))}"
								th:text="${u.role}"></span></td>
							<td><span
								th:class="${u.active}
                                ? 'badge badge-active'
                                : 'badge badge-inactive'"
								th:text="${u.active}
                                ? 'Active':'Inactive'">
							</span></td>
							<td><span th:if="${u.locked}" class="badge badge-locked">
									Locked </span> <span th:unless="${u.locked}"
								style="color: #64748b; font-size: 0.8rem"> — </span></td>
							<td>
								<form
									th:action="@{/admin/users/
                                {id}/toggle(id=${u.id})}"
									method="post" style="display: inline">
									<input type="hidden" th:name="${_csrf.parameterName}"
										th:value="${_csrf.token}" />
									<button type="submit"
										th:class="${u.active}
                                    ? 'btn-sm btn-toggle-on'
                                    : 'btn-sm btn-toggle-off'"
										th:text="${u.active}
                                    ? 'Deactivate' : 'Activate'">
									</button>
								</form>
								<form th:if="${u.locked}"
									th:action="@{/admin/users/
                                {id}/unlock(id=${u.id})}"
									method="post" style="display: inline">
									<input type="hidden" th:name="${_csrf.parameterName}"
										th:value="${_csrf.token}" />
									<button type="submit" class="btn-sm btn-unlock">
										Unlock</button>
								</form>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
	</div>
</body>
</html>
