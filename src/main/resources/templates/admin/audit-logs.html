<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SecureBank — Audit Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#1a3c5e;--primary-light:#2563a8;
            --accent:#f0a500;--bg:#f1f5f9;--card:#fff;
            --text:#1e293b;--muted:#64748b;--border:#e2e8f0;
            --success:#16a34a;--danger:#dc2626;
        }
        body{font-family:'Plus Jakarta Sans',sans-serif;
            background:var(--bg);color:var(--text)}
        .navbar{
            background:linear-gradient(135deg,
                var(--primary) 0%,var(--primary-light) 100%);
            padding:0 32px;height:64px;display:flex;
            align-items:center;justify-content:space-between;
            box-shadow:0 2px 12px rgba(26,60,94,0.2);
        }
        .nav-brand{font-size:1.4rem;font-weight:700;color:#fff}
        .nav-brand span{color:var(--accent)}
        .layout{display:flex;min-height:calc(100vh - 64px)}
        .sidebar{width:230px;background:var(--card);
            border-right:1px solid var(--border);
            padding:24px 0;position:sticky;
            top:64px;height:calc(100vh - 64px)}
        .sidebar-section{font-size:0.68rem;font-weight:700;
            color:var(--muted);text-transform:uppercase;
            letter-spacing:1px;padding:16px 20px 6px}
        .nav-item{display:flex;align-items:center;gap:10px;
            padding:10px 20px;font-size:0.875rem;
            color:var(--muted);text-decoration:none;
            border-left:3px solid transparent;
            transition:all 0.15s}
        .nav-item.active,.nav-item:hover{background:#f8fafc;
            color:var(--primary);
            border-left-color:var(--primary-light);
            font-weight:600}
        .main{flex:1;padding:28px 32px}
        .page-title{font-size:1.4rem;font-weight:700;
            margin-bottom:20px}

        /* FILTER */
        .filter-bar{display:flex;gap:8px;margin-bottom:20px;
            flex-wrap:wrap;align-items:center}
        .filter-label{font-size:0.8rem;font-weight:600;
            color:var(--muted)}
        .filter-tab{padding:6px 14px;border-radius:20px;
            font-size:0.78rem;font-weight:600;
            text-decoration:none;color:var(--muted);
            background:var(--card);
            border:1.5px solid var(--border);
            transition:all 0.15s;white-space:nowrap}
        .filter-tab.active{
            background:var(--primary);color:#fff;
            border-color:var(--primary)}
        .filter-tab:hover:not(.active){
            background:#eff6ff;color:var(--primary);
            border-color:var(--primary-light)}

        /* TABLE */
        .table-card{background:var(--card);
            border-radius:14px;border:1px solid var(--border);
            overflow:hidden;
            box-shadow:0 2px 8px rgba(0,0,0,0.04)}
        .table-header{padding:14px 20px;
            border-bottom:1px solid var(--border);
            display:flex;justify-content:space-between;
            align-items:center}
        .table-title{font-size:0.9rem;font-weight:700}
        .count{background:#f1f5f9;color:var(--muted);
            padding:3px 10px;border-radius:20px;
            font-size:0.75rem;font-weight:600}
        table{width:100%;border-collapse:collapse}
        th{padding:10px 16px;font-size:0.68rem;
            font-weight:700;text-transform:uppercase;
            color:var(--muted);background:#f8fafc;
            border-bottom:1px solid var(--border);
            text-align:left}
        td{padding:11px 16px;font-size:0.82rem;
            border-bottom:1px solid #f1f5f9;
            vertical-align:middle}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#f8fafc}

        /* ACTION BADGES */
        .action-badge{padding:4px 10px;border-radius:6px;
            font-size:0.7rem;font-weight:700;
            letter-spacing:0.3px}
        .action-transfer{background:#eff6ff;color:#2563eb}
        .action-deposit{background:#f0fdf4;color:#16a34a}
        .action-withdrawal{background:#fff7ed;color:#c2410c}
        .action-login{background:#faf5ff;color:#7c3aed}
        .action-loan{background:#fef3c7;color:#92400e}
        .action-default{background:#f1f5f9;color:var(--muted)}

        .empty-state{padding:60px;text-align:center;
            color:var(--muted);font-size:0.875rem}
        .btn-logout{padding:8px 18px;
            background:rgba(255,255,255,0.15);
            color:#fff;border:1px solid rgba(255,255,255,0.3);
            border-radius:8px;font-size:0.82rem;
            font-family:inherit;cursor:pointer}
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">Secure<span>Bank</span></div>
    <form th:action="@{/auth/logout}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <button type="submit" class="btn-logout">
            Logout
        </button>
    </form>
</nav>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-section">Main</div>
        <a th:href="@{/admin/dashboard}" class="nav-item">
            <span>🏠</span> Dashboard
        </a>
        <div class="sidebar-section">System</div>
        <a th:href="@{/admin/users}" class="nav-item">
            <span>👥</span> All Users
        </a>
        <a th:href="@{/admin/transactions}"
           class="nav-item">
            <span>💳</span> Transactions
        </a>
        <a th:href="@{/admin/audit-logs}"
           class="nav-item active">
            <span>📋</span> Audit Logs
        </a>
        <a th:href="@{/admin/reports}" class="nav-item">
    <span>📊</span> Reports
</a>
    </aside>

    <main class="main">
        <div class="page-title">📋 Audit Logs</div>

        <!-- Action Filter -->
        <div class="filter-bar">
            <span class="filter-label">Filter:</span>
            <a th:href="@{/admin/audit-logs(action=all)}"
               th:classappend="${actionFilter == 'all'}
                   ? ' active'"
               class="filter-tab">All Actions</a>
            <a th:each="act : ${distinctActions}"
               th:href="@{/admin/audit-logs(action=${act})}"
               th:classappend="${actionFilter == act}
                   ? ' active'"
               th:text="${act}"
               class="filter-tab">
            </a>
        </div>

        <div class="table-card">
            <div class="table-header">
                <div class="table-title">
                    System Activity Logs
                </div>
                <span class="count"
                      th:text="${logs.size()}
                          + ' entries'">
                </span>
            </div>

            <div th:if="${logs.isEmpty()}"
                 class="empty-state">
                No audit logs found
            </div>

            <table th:unless="${logs.isEmpty()}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Details</th>
                        <th>IP Address</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log,i : ${logs}">
                        <td th:text="${i.count}"
                            style="color:var(--muted)">
                        </td>
                        <td style="font-size:0.75rem;
                                   color:var(--muted)"
                            th:text="${#temporals.format(
                                log.timestamp,
                                'dd MMM yyyy, HH:mm:ss')}">
                        </td>
                        <td>
                            <div style="font-weight:600;
                                        font-size:0.82rem"
                                 th:text="${log.username}">
                            </div>
                        </td>
                        <td>
                            <span
                              th:class="${log.action.contains('TRANSFER')} ? 'action-badge action-transfer'
                                : (${log.action.contains('DEPOSIT')} ? 'action-badge action-deposit'
                                : (${log.action.contains('WITHDRAWAL')} ? 'action-badge action-withdrawal'
                                : (${log.action.contains('LOGIN')} ? 'action-badge action-login'
                                : (${log.action.contains('LOAN')} ? 'action-badge action-loan'
                                : 'action-badge action-default'))))"
                              th:text="${log.action}">
                            </span>
                        </td>
                        <td style="font-size:0.78rem;
                                   color:var(--muted);
                                   max-width:220px"
                            th:text="${log.details ?: '—'}">
                        </td>
                        <td style="font-family:monospace;
                                   font-size:0.75rem;
                                   color:var(--muted)"
                            th:text="${log.ipAddress ?: '—'}">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
