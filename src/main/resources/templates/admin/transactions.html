<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>SecureBank — All Transactions</title>
<link
	href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
	rel="stylesheet">
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box
}

:root {
	--primary: #1a3c5e;
	--primary-light: #2563a8;
	--accent: #f0a500;
	--success: #16a34a;
	--danger: #dc2626;
	--bg: #f1f5f9;
	--card: #fff;
	--text: #1e293b;
	--muted: #64748b;
	--border: #e2e8f0;
}

body {
	font-family: 'Plus Jakarta Sans', sans-serif;
	background: var(--bg);
	color: var(--text)
}

.navbar {
	background: linear-gradient(135deg, var(--primary) 0%,
		var(--primary-light) 100%);
	padding: 0 32px;
	height: 64px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	box-shadow: 0 2px 12px rgba(26, 60, 94, 0.2);
}

.nav-brand {
	font-size: 1.4rem;
	font-weight: 700;
	color: #fff
}

.nav-brand span {
	color: var(--accent)
}

.layout {
	display: flex;
	min-height: calc(100vh - 64px)
}

.sidebar {
	width: 230px;
	background: var(--card);
	border-right: 1px solid var(--border);
	padding: 24px 0
}

.sidebar-section {
	font-size: 0.68rem;
	font-weight: 700;
	color: var(--muted);
	text-transform: uppercase;
	letter-spacing: 1px;
	padding: 16px 20px 6px
}

.nav-item {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 10px 20px;
	font-size: 0.875rem;
	color: var(--muted);
	text-decoration: none;
	border-left: 3px solid transparent;
	transition: all 0.15s
}

.nav-item.active, .nav-item:hover {
	background: #f8fafc;
	color: var(--primary);
	border-left-color: var(--primary-light);
	font-weight: 600
}

.main {
	flex: 1;
	padding: 28px 32px
}

.page-title {
	font-size: 1.4rem;
	font-weight: 700;
	margin-bottom: 20px
}

.table-card {
	background: var(--card);
	border-radius: 14px;
	border: 1px solid var(--border);
	overflow: hidden
}

.table-header {
	padding: 14px 20px;
	border-bottom: 1px solid var(--border);
	display: flex;
	justify-content: space-between;
	align-items: center
}

.table-title {
	font-size: 0.9rem;
	font-weight: 700
}

.count {
	background: #f1f5f9;
	color: var(--muted);
	padding: 3px 10px;
	border-radius: 20px;
	font-size: 0.75rem;
	font-weight: 600
}

table {
	width: 100%;
	border-collapse: collapse
}

th {
	padding: 9px 14px;
	font-size: 0.68rem;
	font-weight: 700;
	text-transform: uppercase;
	color: var(--muted);
	background: #f8fafc;
	border-bottom: 1px solid var(--border);
	text-align: left
}

td {
	padding: 11px 14px;
	font-size: 0.82rem;
	border-bottom: 1px solid #f1f5f9
}

tr:last-child td {
	border-bottom: none
}

tr:hover td {
	background: #f8fafc
}

.badge {
	padding: 3px 9px;
	border-radius: 20px;
	font-size: 0.7rem;
	font-weight: 700
}

.badge-success {
	background: #dcfce7;
	color: #15803d
}

.badge-failed {
	background: #fee2e2;
	color: var(--danger)
}

.badge-transfer {
	background: #eff6ff;
	color: #2563eb
}

.badge-deposit {
	background: #f0fdf4;
	color: #16a34a
}

.badge-withdrawal {
	background: #fff7ed;
	color: #c2410c
}

.badge-loan {
	background: #faf5ff;
	color: #7c3aed
}

.empty {
	padding: 40px;
	text-align: center;
	color: var(--muted);
	font-size: 0.875rem
}

.btn-logout {
	padding: 8px 18px;
	background: rgba(255, 255, 255, 0.15);
	color: #fff;
	border: 1px solid rgba(255, 255, 255, 0.3);
	border-radius: 8px;
	font-size: 0.82rem;
	font-family: inherit;
	cursor: pointer
}
</style>
</head>
<body>
	<nav class="navbar">
		<div class="nav-brand">
			Secure<span>Bank</span>
		</div>
		<form th:action="@{/auth/logout}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<button type="submit" class="btn-logout">Logout</button>
		</form>
	</nav>

	<div class="layout">
		<aside class="sidebar">
			<div class="sidebar-section">Main</div>
			<a th:href="@{/admin/dashboard}" class="nav-item"> <span>🏠</span>
				Dashboard
			</a>
			<div class="sidebar-section">System</div>
			<a th:href="@{/admin/users}" class="nav-item"> <span>👥</span>
				All Users
			</a> <a th:href="@{/admin/transactions}" class="nav-item active"> <span>💳</span>
				Transactions
			</a> <a th:href="@{/admin/audit-logs}" class="nav-item"> <span>📋</span>
				Audit Logs
			</a> <a th:href="@{/admin/reports}" class="nav-item"> <span>📊</span>
				Reports
			</a>
		</aside>

		<main class="main">
			<div class="page-title">💳 All Transactions</div>

			<div class="table-card">
				<div class="table-header">
					<div class="table-title">Recent 100 Transactions</div>
					<span class="count"
						th:text="${transactions.size()}
                          + ' records'"></span>
				</div>

				<div th:if="${transactions.isEmpty()}" class="empty">No
					transactions yet</div>

				<table th:unless="${transactions.isEmpty()}">
					<thead>
						<tr>
							<th>Reference</th>
							<th>Type</th>
							<th>From</th>
							<th>To</th>
							<th>Amount</th>
							<th>Status</th>
							<th>Date</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="txn : ${transactions}">
							<td style="font-family: monospace; font-size: 0.75rem"
								th:text="${txn.referenceNumber}"></td>
							<td><span
								th:class="${txn.type.name()=='TRANSFER' ? 'badge badge-transfer' : (txn.type.name()=='DEPOSIT' ? 'badge badge-deposit' : (txn.type.name()=='WITHDRAWAL' ? 'badge badge-withdrawal' : 'badge badge-loan'))}"
								th:text="${txn.type}"></span></td>
							<td style="font-family: monospace; font-size: 0.75rem"
								th:text="${txn.fromAccount != null}
                                ? ${txn.fromAccount
                                    .accountNumber} : '—'">
							</td>
							<td style="font-family: monospace; font-size: 0.75rem"
								th:text="${txn.toAccount != null}
                                ? ${txn.toAccount
                                    .accountNumber} : '—'">
							</td>
							<td style="font-weight: 700" th:text="${'Rs.' + #numbers.formatDecimal(txn.amount,1,'COMMA',2,'POINT')}"></td>
							<td><span
								th:class="${txn.status.name()
                                == 'SUCCESS'}
                                ? 'badge badge-success'
                                : 'badge badge-failed'"
								th:text="${txn.status}"> </span></td>
							<td
								th:text="${#temporals.format(
                            txn.timestamp,
                            'dd MMM yyyy, HH:mm')}"
								style="font-size: 0.75rem; color: #64748b"></td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
	</div>
</body>
</html>
