<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SecureBank — Teller Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#1a3c5e;--primary-light:#2563a8;
            --accent:#f0a500;--success:#16a34a;
            --danger:#dc2626;--bg:#f1f5f9;--card:#fff;
            --text:#1e293b;--muted:#64748b;--border:#e2e8f0;
        }
        body{font-family:'Plus Jakarta Sans',sans-serif;
            background:var(--bg);color:var(--text)}
        .navbar{
            background:linear-gradient(135deg,
                var(--primary) 0%,var(--primary-light) 100%);
            padding:0 32px;height:64px;display:flex;
            align-items:center;justify-content:space-between;
            box-shadow:0 2px 12px rgba(26,60,94,0.2);
            position:sticky;top:0;z-index:100;
        }
        .nav-brand{font-size:1.4rem;font-weight:700;color:#fff}
        .nav-brand span{color:var(--accent)}
        .nav-right{display:flex;align-items:center;gap:16px}
        .nav-role{
            background:rgba(255,255,255,0.15);color:#fff;
            padding:4px 12px;border-radius:20px;
            font-size:0.75rem;font-weight:700;
        }
        .btn-logout{
            padding:8px 18px;
            background:rgba(255,255,255,0.15);
            color:#fff;border:1px solid rgba(255,255,255,0.3);
            border-radius:8px;font-size:0.82rem;
            font-family:inherit;cursor:pointer;
        }
        .layout{display:flex;min-height:calc(100vh - 64px)}
        .sidebar{
            width:220px;background:var(--card);
            border-right:1px solid var(--border);padding:24px 0;
        }
        .sidebar-section{
            font-size:0.68rem;font-weight:700;
            color:var(--muted);text-transform:uppercase;
            letter-spacing:1px;padding:16px 20px 6px;
        }
        .nav-item{
            display:flex;align-items:center;gap:10px;
            padding:10px 20px;font-size:0.875rem;
            color:var(--muted);text-decoration:none;
            border-left:3px solid transparent;transition:all 0.15s;
        }
        .nav-item.active,.nav-item:hover{
            background:#f8fafc;color:var(--primary);
            border-left-color:var(--primary-light);font-weight:600;
        }
        .main{flex:1;padding:28px 32px}
        .page-title{font-size:1.4rem;font-weight:700;
            margin-bottom:6px}
        .page-subtitle{color:var(--muted);font-size:0.875rem;
            margin-bottom:24px}
        .alert{padding:12px 16px;border-radius:10px;
            font-size:0.875rem;margin-bottom:20px}
        .alert-success{background:#f0fdf4;color:var(--success);
            border:1px solid #bbf7d0}
        .alert-danger{background:#fef2f2;color:var(--danger);
            border:1px solid #fecaca}
        .actions-grid{
            display:grid;grid-template-columns:repeat(2,1fr);
            gap:20px;max-width:600px;margin-bottom:32px;
        }
        .action-card{
            background:var(--card);border-radius:16px;
            border:1px solid var(--border);padding:28px;
            text-align:center;text-decoration:none;
            color:var(--text);transition:all 0.2s;
            box-shadow:0 2px 8px rgba(0,0,0,0.04);
        }
        .action-card:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 24px rgba(26,60,94,0.15);
            border-color:var(--primary-light);
        }
        .action-card.deposit:hover{
            background:linear-gradient(135deg,
                #f0fdf4,#dcfce7);
        }
        .action-card.withdraw:hover{
            background:linear-gradient(135deg,
                #fef2f2,#fee2e2);
        }
        .action-icon{font-size:2.5rem;margin-bottom:12px}
        .action-title{font-size:1.1rem;font-weight:700;
            margin-bottom:6px}
        .action-desc{font-size:0.8rem;color:var(--muted)}
        .table-card{
            background:var(--card);border-radius:14px;
            border:1px solid var(--border);overflow:hidden;
            max-width:800px;
        }
        .table-header{
            padding:14px 20px;
            border-bottom:1px solid var(--border);
        }
        .table-title{font-size:0.9rem;font-weight:700}
        table{width:100%;border-collapse:collapse}
        th{
            padding:9px 16px;font-size:0.7rem;font-weight:700;
            text-transform:uppercase;color:var(--muted);
            background:#f8fafc;
            border-bottom:1px solid var(--border);text-align:left;
        }
        td{padding:11px 16px;font-size:0.85rem;
            border-bottom:1px solid #f1f5f9}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:#f8fafc}
        .badge-active{
            padding:3px 10px;border-radius:20px;
            font-size:0.7rem;font-weight:700;
            background:#dcfce7;color:#15803d;
        }
        .empty{padding:32px;text-align:center;
            color:var(--muted);font-size:0.85rem}
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">Secure<span>Bank</span></div>
    <div class="nav-right">
        <span class="nav-role">TELLER</span>
        <span style="color:rgba(255,255,255,0.85);font-size:0.85rem"
              th:text="${teller.fullName}"></span>
        <form th:action="@{/auth/logout}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-section">Operations</div>
        <a th:href="@{/teller/dashboard}"
           class="nav-item active">
            <span>🏠</span> Dashboard
        </a>
        <a th:href="@{/teller/deposit}" class="nav-item">
            <span>💰</span> Cash Deposit
        </a>
        <a th:href="@{/teller/withdraw}" class="nav-item">
            <span>💸</span> Cash Withdrawal
        </a>
    </aside>

    <main class="main">
        <div class="page-title">
            Welcome, <span th:text="${teller.fullName}"></span>
        </div>
        <div class="page-subtitle">
            Teller Operations Dashboard
        </div>

        <div th:if="${successMsg}" class="alert alert-success">
            ✅ <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>

        <!-- Quick Actions -->
        <div class="actions-grid">
            <a th:href="@{/teller/deposit}"
               class="action-card deposit">
                <div class="action-icon">💰</div>
                <div class="action-title">Cash Deposit</div>
                <div class="action-desc">
                    Deposit cash to customer account
                </div>
            </a>
            <a th:href="@{/teller/withdraw}"
               class="action-card withdraw">
                <div class="action-icon">💸</div>
                <div class="action-title">Cash Withdrawal</div>
                <div class="action-desc">
                    Withdraw cash from customer account
                </div>
            </a>
        </div>

        <!-- Active Customers -->
        <div class="table-card">
            <div class="table-header">
                <div class="table-title">
                    Active Customers
                </div>
            </div>
            <div th:if="${customers.isEmpty()}" class="empty">
                No active customers found
            </div>
            <table th:unless="${customers.isEmpty()}">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${customers}">
                        <td th:text="${c.fullName}"></td>
                        <td th:text="${c.email}"
                            style="font-size:0.8rem"></td>
                        <td th:text="${c.phone ?: '—'}"></td>
                        <td>
                            <span class="badge-active">
                                Active
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
