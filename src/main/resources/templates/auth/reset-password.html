<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank — Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-banner">
        <div class="bank-logo">Secure<span>Bank</span></div>
        <div class="bank-tagline">Set New Password</div>
        <ul class="banner-features">
            <li><div class="feature-icon">🔑</div> Enter the OTP from email</li>
            <li><div class="feature-icon">🔐</div> Choose a strong password</li>
            <li><div class="feature-icon">✅</div> Login with new password</li>
        </ul>
    </div>

    <div class="auth-form-panel">
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle">Enter the OTP sent to your email and set a new password</p>

        <div th:if="${errorMsg}" class="alert alert-danger">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>

        <form th:action="@{/auth/reset-password}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <input type="hidden" name="email" th:value="${email}"/>

            <div class="form-group">
                <label class="form-label">OTP (6-digit code from email)</label>
                <input type="text"
                       name="otp"
                       class="form-control"
                       placeholder="Enter 6-digit OTP"
                       maxlength="6"
                       required autofocus/>
            </div>

            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password"
                       name="newPassword"
                       class="form-control"
                       placeholder="Min 8 characters"
                       required/>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password"
                       name="confirmNewPassword"
                       class="form-control"
                       placeholder="Repeat new password"
                       required/>
            </div>

            <button type="submit" class="btn-primary-auth">
                Reset Password →
            </button>
        </form>

        <div class="auth-links">
            <a th:href="@{/auth/forgot-password}">← Resend OTP</a>
        </div>
    </div>
</div>

</body>
</html>
