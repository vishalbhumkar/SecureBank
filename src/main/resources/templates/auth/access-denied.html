<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SecureBank — Access Denied</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <style>
        .denied-box {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(26,60,94,0.15);
            max-width: 460px;
            width: 100%;
            margin: 20px;
        }
        .denied-icon { font-size: 4rem; margin-bottom: 16px; }
        .denied-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .denied-msg {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #1a3c5e, #2563a8);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-back:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(26,60,94,0.3);
        }
    </style>
</head>
<body>
    <div class="denied-box">
        <div class="denied-icon">🚫</div>
        <div class="denied-title">Access Denied</div>
        <div class="denied-msg">
            You do not have permission to view this page.<br>
            Please contact your administrator if you believe this is an error.
        </div>
        <a th:href="@{/auth/login}" class="btn-back">← Go to Login</a>
    </div>
</body>
</html>
