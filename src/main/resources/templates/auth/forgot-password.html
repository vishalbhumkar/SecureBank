<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank — Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-banner">
        <div class="bank-logo">Secure<span>Bank</span></div>
        <div class="bank-tagline">Account Recovery</div>
        <ul class="banner-features">
            <li><div class="feature-icon">📧</div> OTP sent to your email</li>
            <li><div class="feature-icon">⏱️</div> Valid for 5 minutes only</li>
            <li><div class="feature-icon">🔒</div> Secured reset process</li>
        </ul>
    </div>

    <div class="auth-form-panel">
        <h2 class="auth-title">Forgot Password?</h2>
        <p class="auth-subtitle">
            Enter your registered email and we'll send you an OTP
        </p>

        <div th:if="${errorMsg}" class="alert alert-danger">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>
        <div th:if="${successMsg}" class="alert alert-success">
            ✅ <span th:text="${successMsg}"></span>
        </div>

        <form th:action="@{/auth/forgot-password}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label">Registered Email Address</label>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="you@example.com"
                       required autofocus/>
            </div>

            <button type="submit" class="btn-primary-auth">
                Send OTP →
            </button>
        </form>

        <div class="auth-links">
            <a th:href="@{/auth/login}">← Back to Login</a>
        </div>
    </div>
</div>

</body>
</html>
